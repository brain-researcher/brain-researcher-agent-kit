name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[runner]"

      - name: Check issue template YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in sorted(Path(".github/ISSUE_TEMPLATE").glob("*.yml")):
              with path.open() as fh:
                  yaml.safe_load(fh)
              print(f"OK {path}")
          PY

      - name: Check JSON fixtures
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          for path in sorted(Path(".").rglob("*.json")):
              if ".git" in path.parts:
                  continue
              with path.open() as fh:
                  json.load(fh)
              print(f"OK {path}")
          PY

      - name: Run demo evals
        run: python -m evals.runner --all

      - name: Redaction guard
        run: python scripts/redaction_guard.py

      - name: Whitespace check
        run: git diff --check

  auditable-workflow:
    runs-on: ubuntu-latest
    env:
      # Public audit-bundle implementation from brain-researcher-public PR #5.
      BR_PUBLIC_REVISION: f28213185d97dfb8acc58e2d6c050ed4ddbe16ff
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install public auditable-workflow dependencies
        run: |
          python -m pip install -e ".[runner]"
          python -m pip install \
            "brain-researcher @ git+https://github.com/brain-researcher/brain-researcher-public.git@${BR_PUBLIC_REVISION}" \
            "nimare>=0.5.0" \
            "nilearn>=0.11.0"

      - name: Run public-only auditable workflow
        run: |
          python skills/auditable-episode/scripts/run_episode.py \
            --workdir "${RUNNER_TEMP}/auditable-episode"
