        abstract_word_limit:
          max: 250
          strict: false
        required_sections_or_keywords:
          - "Implementation details"
          - "Comparison with recent methods"

global_detection:
  figure_patterns:
    - "(?im)^\\s*(figure|fig\\.?|table)\\s+[0-9ivxlcdm]+\\b"
    - "(?im)!\\[[^\\]]*\\]\\([^\\)]*\\)"
  reference_entry_patterns:
    - "(?m)^\\s*\\[[0-9]+\\]\\s+"
    - "(?m)^\\s*[0-9]+\\.\\s+"
    - "(?m)^\\s*[-*]\\s+"
