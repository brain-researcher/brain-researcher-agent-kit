version: "1.0"
language: "en"
last_curated_date: "2026-03-03"

journals:
  nature_neuroscience:
    canonical_name: "Nature Neuroscience"
    aliases: ["Nat Neurosci"]
    source_refs: ["nature_neuroscience"]
    article_types:
      research_article:
        required_sections: ["Abstract", "Introduction", "Results", "Discussion", "Methods", "References"]
        section_order: ["Introduction", "Results", "Discussion", "Methods"]
        methods_position: "after_results"
        abstract_word_limit:
          min: 100
          max: 150
          strict: true
        main_text_word_limit:
          min: 2000
          max: 4000
          strict: false
        methods_word_limit:
          max: 2000
          strict: false
        display_items_max:
          value: 8
          strict: false
        references_max:
          value: 50
          strict: false
        required_subsections_in_methods: ["Statistical analysis"]

  neuron:
    canonical_name: "Neuron"
    aliases: []
