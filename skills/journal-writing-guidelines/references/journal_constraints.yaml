        section_order: ["Introduction", "Related Work", "Methods", "Results", "Discussion"]
        methods_position: "before_results"
        abstract_word_limit:
          max: 250
          strict: true
        required_sections_or_keywords:
          - "Ablation"
          - "Baseline comparison"
        architecture_figure_required: true

  ieee_tmi:
    canonical_name: "IEEE Transactions on Medical Imaging"
    aliases: ["TMI", "IEEE TMI"]
    source_refs: ["ieee_tmi"]
    article_types:
