    aliases: ["JNeurosci"]
    source_refs: ["journal_of_neuroscience"]
    positioning: "General neuroscience journal emphasizing clear hypotheses, rigorous analyses, and calibrated claims."
    core_message:
      primary_claim: "The manuscript should test explicit hypotheses with transparent evidence and statistics."
