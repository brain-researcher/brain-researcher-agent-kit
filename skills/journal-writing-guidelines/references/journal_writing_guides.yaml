version: "1.0"
language: "en"
last_curated_date: "2026-03-04"

journals:
  nature_neuroscience:
    name: "Nature Neuroscience"
    aliases: ["Nat Neurosci"]
    source_refs: ["nature_neuroscience"]
    positioning: "General-interest neuroscience venue for conceptually decisive advances with field-wide relevance."
    core_message:
      primary_claim: "The work reveals a previously unreported neural mechanism, not only a better prediction score."
      value_to_reader: "Readers should leave with a concrete shift in how an important neuroscience problem is understood."
      what_not_to_overclaim: "Do not claim causality, universality, or clinical impact without direct evidence."
    narrative_goals:
      abstract:
        mission: "State question, key mechanistic result, and broad significance in one arc."
        include: ["problem importance", "core result", "field-level implication"]
        avoid: ["implementation detail overload", "benchmark shopping", "speculative claims"]
      introduction:
        mission: "Open broad, define unresolved mechanism, then narrow to testable hypotheses."
        include: ["cross-subfield context", "specific gap", "clear hypothesis"]
        avoid: ["narrow tool-centric framing", "long method preamble"]
      methods:
        mission: "Provide enough detail for reproducibility while staying secondary to the conceptual story."
        include: ["statistics subsection", "sample definition", "model/data controls"]
        avoid: ["omitting QC decisions", "buried exclusions"]
      results:
        mission: "Sequence results from validation to mechanism and finish with robustness checks."
        include: ["effect sizes", "control analyses", "uncertainty"]
        avoid: ["claim-first without evidence", "incoherent figure order"]
      discussion:
        mission: "Translate findings into mechanistic meaning and domain-wide implications with calibrated limits."
        include: ["mechanistic interpretation", "boundary conditions", "next decisive experiment"]
        avoid: ["marketing language", "unbounded extrapolation"]
    claim_ladder:
      conservative: "The data are consistent with a hierarchical cortical coding pattern under the tested conditions."
      standard: "The findings support a hierarchical cortical coding mechanism for the targeted cognitive process."
      strong: "The study identifies a hierarchical cortical coding mechanism that reframes this class of computations."
    figure_strategy:
      main_figures:
        min: 5
        target: 7
        max: 8
      figure_story_arc:
        - slot: 1
          title: "Question and paradigm"
          purpose: "Make the unresolved neuroscience question concrete."
          must_include: ["task/design overview", "sample counts", "analysis roadmap"]
        - slot: 2
          title: "Primary phenomenon"
          purpose: "Show the central empirical effect with uncertainty."
          must_include: ["main contrast", "confidence interval", "effect size"]
        - slot: 3
          title: "Mechanistic decomposition"
          purpose: "Dissect components that support mechanism-level interpretation."
          must_include: ["component analysis", "control model", "regional specificity"]
        - slot: 4
          title: "Alternative explanations"
          purpose: "Rule out key confounds and rival hypotheses."
          must_include: ["negative controls", "robustness to preprocessing", "sensitivity tests"]
        - slot: 5
          title: "Generalization"
          purpose: "Show consistency across cohorts, tasks, or datasets."
          must_include: ["external split", "cross-subject behavior", "error bars"]
        - slot: 6
          title: "Boundary conditions"
          purpose: "Specify where the mechanism does and does not apply."
          must_include: ["failure regime", "uncertainty map", "interpretation note"]
        - slot: 7
          title: "Synthesis"
          purpose: "Close with compact mechanism model."
          must_include: ["summary schematic", "testable predictions", "limitation hook"]
      must_have_figure_types: ["mechanism figure", "control figure", "generalization figure"]
      supplement_priority: ["extended stats", "additional controls", "hyperparameter sweeps"]
    style_rules:
      - "Use assertive but evidence-calibrated statements."
      - "Prefer short, claim-first paragraphs with explicit uncertainty."
      - "Keep terminology stable across sections."
    dos:
      - "Lead each Results subsection with the biological question."
      - "Quantify uncertainty in every primary claim."
      - "End Discussion with mechanistic implications and a falsifiable next step."
    donts:
      - "Do not frame novelty as only metric gain."
      - "Do not hide failed controls in supplement-only text."
      - "Do not oversell translational value without direct validation."
    reviewer_focus:
      - "Whether the result changes mechanistic understanding."
      - "Whether controls eliminate plausible alternatives."
      - "Whether claims match statistical strength."
    common_reject_reasons:
      - "Incremental prediction improvement without conceptual advance."
      - "Weak controls for alternative explanations."
      - "Overstated implications relative to evidence."

  neuron:
    name: "Neuron"
    aliases: []
    source_refs: ["neuron"]
    positioning: "High-impact neuroscience journal favoring mechanistic narratives with broad conceptual value."
    core_message:
      primary_claim: "The paper should connect rigorous evidence to a coherent neural mechanism."
      value_to_reader: "Readers should gain a model of circuit or representational function that transfers across contexts."
      what_not_to_overclaim: "Do not treat correlational mapping as mechanistic proof."
    narrative_goals:
      abstract:
        mission: "Present mechanism, evidence basis, and conceptual contribution succinctly."
        include: ["question", "major result", "mechanistic implication"]
        avoid: ["tool-centric pitch", "unqualified novelty language"]
      introduction:
        mission: "Build a persuasive arc from open question to testable mechanistic predictions."
        include: ["conceptual tension", "hypothesis", "predicted outcomes"]
        avoid: ["excessive historical summary", "weak rationale for design choices"]
      methods:
        mission: "Provide transparent, reproducible procedures aligned to each key claim."
        include: ["participant/recording details", "statistical analysis", "model diagnostics"]
        avoid: ["opaque preprocessing", "missing exclusion rules"]
      results:
        mission: "Move from core effect to mechanistic probes and robustness."
        include: ["hypothesis-anchored subheadings", "control analyses", "cross-validation"]
        avoid: ["fragmented narrative", "conclusion without statistics"]
      discussion:
        mission: "Integrate findings with theory and articulate tractable open questions."
        include: ["model update", "limitations", "future discriminative tests"]
        avoid: ["broad unsupported generalization", "method-only recap"]
    claim_ladder:
      conservative: "Results are compatible with a mechanism linking the observed computations."
      standard: "Results support a mechanism linking the observed computations."
      strong: "Results identify a mechanism that reorganizes current interpretation of this neural computation."
    figure_strategy:
      main_figures:
        min: 5
        target: 7
        max: 8
      figure_story_arc:
        - slot: 1
          title: "Conceptual model and hypotheses"
          purpose: "Anchor readers in the mechanistic question."
          must_include: ["mechanistic hypothesis", "predicted outcomes", "design overview"]
        - slot: 2
          title: "Core empirical effect"
          purpose: "Demonstrate the strongest central finding."
          must_include: ["primary metric", "effect size", "confidence intervals"]
        - slot: 3
          title: "Mechanistic intervention/probe"
          purpose: "Test mechanism-specific predictions."
          must_include: ["probe logic", "comparison conditions", "statistics"]
        - slot: 4
          title: "Control analyses"
          purpose: "Address confounds and alternative hypotheses."
          must_include: ["negative controls", "sensitivity checks", "robustness"]
        - slot: 5
          title: "Generalization"
          purpose: "Show transfer across cohorts/tasks/modalities."
          must_include: ["external validation", "error analysis", "consistency"]
        - slot: 6
          title: "Mechanistic synthesis"
          purpose: "Close loop with coherent explanatory model."
          must_include: ["summary diagram", "evidence mapping", "testable prediction"]
        - slot: 7
          title: "Boundary and limits"
          purpose: "Clarify scope and constraints."
          must_include: ["failure cases", "uncertainty", "interpretation limits"]
      must_have_figure_types: ["hypothesis figure", "control figure", "synthesis schematic"]
      supplement_priority: ["replication analyses", "extended model diagnostics", "additional condition splits"]
    style_rules:
      - "Use mechanism-centered section headers."
      - "Maintain conceptual continuity between Intro and Discussion."
      - "Favor decisive statements only when evidence closes alternatives."
    dos:
      - "Explicitly map each claim to a figure panel."
      - "Present discriminative tests against competing mechanisms."
      - "State scope conditions of the mechanism."
    donts:
      - "Do not rely on single-dataset conclusions for broad theory."
      - "Do not treat exploratory analyses as confirmatory."
      - "Do not hide failed hypotheses."
    reviewer_focus:
      - "Mechanistic depth versus descriptive reporting."
      - "Strength of tests against alternatives."
      - "Conceptual coherence across sections."
    common_reject_reasons:
      - "Narrative does not resolve a meaningful mechanistic question."
      - "Insufficient controls or replication evidence."
      - "Claims exceed assay or model resolution."

  imaging_neuroscience:
    name: "Imaging Neuroscience"
    aliases: ["Imag Neurosci", "imaging neurokgscience"]
    source_refs: ["imaging_neuroscience"]
    positioning: "Method-forward neuroimaging venue emphasizing transparency, reproducibility, and quantitative rigor."
    core_message:
      primary_claim: "The manuscript should deliver a reproducible imaging method or analysis advance with practical impact."
      value_to_reader: "Readers should be able to reproduce and evaluate the method end-to-end."
      what_not_to_overclaim: "Do not present pipeline refinements as novel neural mechanisms without dedicated evidence."
    narrative_goals:
      abstract:
        mission: "State method contribution, validation setup, and reproducibility value."
        include: ["technical novelty", "evaluation protocol", "open-science assets"]
        avoid: ["vague performance claims", "missing dataset context"]
      introduction:
        mission: "Define methodological pain point and measurable success criteria."
        include: ["current pipeline limitation", "why prior methods fall short", "target improvement"]
        avoid: ["overly broad neuroscience framing", "marketing tone"]
      methods:
        mission: "Make every preprocessing and modeling decision auditable."
        include: ["participants", "MRI acquisition", "statistical analysis", "QC thresholds"]
        avoid: ["implicit defaults", "missing software versions"]
      results:
        mission: "Show performance, robustness, and reproducibility in parallel."
        include: ["baseline comparisons", "uncertainty", "cross-site checks"]
        avoid: ["single-metric success narrative", "no ablation"]
      discussion:
        mission: "Interpret technical gains, practical limits, and deployment guidance."
        include: ["trade-offs", "failure modes", "recommended usage"]
        avoid: ["inflated mechanistic claims", "underreported caveats"]
    claim_ladder:
      conservative: "The method improves reproducibility under the tested acquisition and preprocessing settings."
      standard: "The method provides a robust and reusable improvement across evaluated neuroimaging settings."
      strong: "The method establishes a new practical standard for this neuroimaging analysis regime."
    figure_strategy:
      main_figures:
        min: 5
        target: 6
        max: 8
      figure_story_arc:
        - slot: 1
          title: "Pipeline overview"
          purpose: "Show full data flow and decision points."
          must_include: ["input/output", "major modules", "config knobs"]
        - slot: 2
          title: "Primary benchmark"
          purpose: "Quantify core gain versus strong baselines."
          must_include: ["baseline table", "effect size", "uncertainty"]
        - slot: 3
          title: "Ablation and sensitivity"
          purpose: "Identify which components drive improvements."
          must_include: ["ablation matrix", "parameter sensitivity", "error bars"]
        - slot: 4
          title: "Quality and confounds"
          purpose: "Demonstrate robustness to motion/noise confounds."
          must_include: ["QC plots", "head-motion controls", "site effects"]
        - slot: 5
          title: "Generalization"
          purpose: "Show cross-dataset or cross-site reliability."
          must_include: ["external dataset", "domain shift analysis", "variance"]
        - slot: 6
          title: "Practical usage summary"
          purpose: "Provide adoption guidance."
          must_include: ["runtime profile", "resource needs", "recommended defaults"]
      must_have_figure_types: ["pipeline diagram", "ablation figure", "reproducibility figure"]
      supplement_priority: ["hyperparameters", "extended QC panels", "additional subgroup analyses"]
    style_rules:
      - "Use precise engineering language and explicit parameter reporting."
      - "Report uncertainty and confidence intervals as first-class results."
      - "Anchor claims to reproducibility outcomes, not only top-line metrics."
    dos:
      - "Provide exact software/tool versions and key flags."
      - "Include multi-comparison control strategy clearly."
      - "Disclose data/code availability and licensing."
    donts:
      - "Do not omit QC thresholds."
      - "Do not compare only weak baselines."
      - "Do not hide unstable results from main narrative."
    reviewer_focus:
      - "Methodological reproducibility and transparency."
      - "Statistical validity and confound handling."
      - "Generalization across sites/cohorts."
    common_reject_reasons:
      - "Insufficient details for replication."
      - "Weak or outdated baseline comparisons."
      - "No convincing robustness evidence."
    reader_translation_rules:
      policy: "Reader-facing terminology only in main text and figure labels."
      forbidden_terms:
        - "abs_voxel"
        - "residual_voxel"
        - "residual_lowrank32"
        - "drop_unresolved"
        - "keep"
        - "B_raw_signed_plus_filteredKG"
      preferred_terms:
        abs_voxel: "Absolute Parcel Activation"
        residual_voxel: "Task-Specific Residual Activation"
        residual_lowrank32: "Residual Subspace (32-D)"
        drop_unresolved: "Ontology-mapped-only ablation"
        keep: "Full cohort"
      definition_requirements:
        - "Define combo/task-family/fold logic in a dedicated Definitions paragraph."
        - "Define ontology-mapped and ontology-unmapped in scientific language before Results."
    evidence_alignment_rules:
      - "If adjusted/composition-controlled models attenuate raw effects, downgrade claim language to conditional/associational."
      - "Treat unresolved-vs-mapped splits as diagnostics unless interventional identification is available."
      - "Do not use causal verbs unless causal design is explicitly present."
    gate_reporting_rules:
      - "Describe operational gate as a practical criterion, not as significance evidence."
      - "Report inferential statistics separately from gate pass/fail decisions."
      - "State threshold rationale briefly and consistently across abstract/results."
    figure_language_contract:
      canonical_terms:
        mapping_status:
          positive: "ontology-mapped"
          negative: "ontology-unmapped"
        target_modes:
          - "Absolute Parcel Activation"
          - "Task-Specific Residual Activation"
          - "Residual Subspace (32-D)"
      disallowed_aliases:
        - "resolved"
        - "unresolved"
        - "semantically resolved"
        - "semantically unresolved"
      legend_alignment_notes:
        - "Use the same mapping-status terms in figure labels, captions, and Results opening sentences."
        - "Avoid introducing code-level mode names in legends."
    figure_drawing_workflow:
      strategy: "Two-pass generation for high-fidelity labels and low typo risk."
      phase_1_structure_pass:
        - "Lock panel order, axes, thresholds, and color mapping first."
        - "Keep panel text short; avoid long explanatory strings in-image."
      phase_2_text_pass:
        - "Apply canonical labels from figure_language_contract and reader_translation_rules."
        - "Move long explanations to caption; keep legend labels compact."
      qc_checklist:
        - "No internal labels in figure text (e.g., abs_voxel/residual_lowrank32/resolved)."
        - "Threshold signs and baseline references match manuscript text."
        - "Figure labels and Results opening paragraph use the same core terms."
      handoff:
        - "Deliver caption with one-sentence term definitions."
        - "Document final label dictionary used for all panels."

