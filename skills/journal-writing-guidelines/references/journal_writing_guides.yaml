          must_include: ["ablation", "component contribution", "error trends"]
        - slot: 4
          title: "Robustness and QC"
          purpose: "Demonstrate stability under realistic confounds."
          must_include: ["motion/site robustness", "QC metrics", "sensitivity"]
        - slot: 5
          title: "Neuroscience interpretation"
          purpose: "Connect method output to interpretable imaging findings."
          must_include: ["maps/patterns", "interpretation caveats", "comparison to prior work"]
        - slot: 6
          title: "Generalization summary"
          purpose: "Provide external validation signal."
          must_include: ["external dataset", "domain shift result", "confidence"]
